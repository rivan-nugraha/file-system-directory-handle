# .github/workflows/build.yml
# Cross-platform Electron build untuk Windows, macOS, Linux
# Trigger: push ke main atau tag version (v1.0.0, dll)

name: Build & Release

on:
  push:
    branches: [main, master, development]
    tags: ['v*']
  workflow_dispatch:  # Bisa trigger manual dari GitHub UI

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (frontend only)
        working-directory: frontend
        run: npm install

      - name: Build Electron
        working-directory: frontend
        run: npm run build && npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: POS-${{ matrix.os }}
          path: frontend/release/*
          retention-days: 7

  # Buat GitHub Release kalau ini tag version (v1.0.0, v0.2.0, etc)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
